# Render Blueprint — Rolling in the Dough
# Deploy with: render-blueprint render.yaml

services:
  # ── Web App (Node/Express server) ──────────────────────────────────────────
  - type: web
    name: rollinginthedough
    env: node
    region: oregon
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health

    # Environment variables — fill in values in Render dashboard or .env file
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false   # Set in Render dashboard → Environment
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_APP_ID
        value: lucky-spins-dev
      - key: VITE_SUPABASE_URL
        value: https://fla0t0f0c1lo5mgtbqj.supabase.co
